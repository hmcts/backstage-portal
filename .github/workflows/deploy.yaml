on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

name: Publish

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write

    strategy:
      matrix:
        node-version: [20.x]

    steps:
      - uses: actions/checkout@v3

      # Beginning of yarn setup, keep in sync between all workflows, see ci.yml
      - name: use node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v3
        with:
          node-version: ${{ matrix.node-version }}
          registry-url: https://registry.npmjs.org/ # Needed for auth

      - name: yarn install
        uses: backstage/actions/yarn-install@v0.5.5
        with:
          cache-prefix: ${{ runner.os }}-v${{ matrix.node-version }}
      # End of yarn setup
      - name: setup dummy credentials file
        run: touch github-app-backstage-hmcts-credentials.yaml

      - name: type checking and declarations
        run: yarn tsc --incremental false

      - name: build
        run: yarn build

      - name: Generate build ID for PR
        if: startsWith(github.ref, 'refs/pull')
        run: |
          pr_ref="${GITHUB_REF_NAME%%/*}"
          sha=${GITHUB_SHA::8}
          ts=$(date +%s)
          echo "CONTAINER_ID=${pr_ref}-${sha}-${ts}" >> $GITHUB_ENV

      - name: Generate build ID for master
        if: github.ref == 'refs/heads/master'
        run: |
          sha=${GITHUB_SHA::8}
          ts=$(date +%s)
          echo "CONTAINER_ID=${sha}-${ts}" >> $GITHUB_ENV

      - name: remove dummy credentials file
        run: rm -f github-app-backstage-hmcts-credentials.yaml

      - name: 'Az CLI login'
        uses: azure/login@v2
        with:
          client-id: b354d443-d632-4d61-8ee8-2abc2c7baf23 # DTS Shared GitHub Actions ACR Publisher 1
          tenant-id: 531ff96d-0ae9-462a-8d2d-bec7c0b42082 # HMCTS.NET
          allow-no-subscriptions: true

      - name: 'ACR Login'
        run: |
          az acr login --name hmctsprod

      # HMCTSPROD ACR
      - name: 'Build and push PR image to HMCTSPROD'
        if: startsWith(github.ref, 'refs/pull')
        run: |
          yarn workspace backend build-image
          docker tag backstage:latest hmctsprod.azurecr.io/backstage-portal/backend:pr-$CONTAINER_ID
          docker push hmctsprod.azurecr.io/backstage-portal/backend:pr-$CONTAINER_ID

      - name: 'Build and push prod image to HMCTSPROD'
        if: github.ref == 'refs/heads/master'
        run: |
          yarn workspace backend build-image
          docker tag backstage:latest hmctsprod.azurecr.io/backstage-portal/backend:prod-$CONTAINER_ID
          docker push hmctsprod.azurecr.io/backstage-portal/backend:prod-$CONTAINER_ID

      # HMCTSPUBLIC ACR - to be deprecated post migration to hmctsprod
      - name: 'Build and push image'
        uses: azure/docker-login@v2
        with:
          login-server: ${{ secrets.REGISTRY_LOGIN_SERVER }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}
      - run: |
          yarn workspace backend build-image
          docker tag backstage:latest ${{ secrets.REGISTRY_LOGIN_SERVER }}/backstage-portal/backend:pr-$CONTAINER_ID
          docker push ${{ secrets.REGISTRY_LOGIN_SERVER }}/backstage-portal/backend:pr-$CONTAINER_ID
        if: startsWith(github.ref, 'refs/pull')
      - run: |
          yarn workspace backend build-image
          docker tag backstage:latest ${{ secrets.REGISTRY_LOGIN_SERVER }}/backstage-portal/backend:prod-$CONTAINER_ID
          docker push ${{ secrets.REGISTRY_LOGIN_SERVER }}/backstage-portal/backend:prod-$CONTAINER_ID
        if: github.ref == 'refs/heads/master'


